name: tm-scan agentic workflow

on:
  pull_request:
    branches: [ "**" ]
  push:
    branches: [ "main" ]
  workflow_dispatch: 

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  tm-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          path: target-repo

      - name: Checkout tm-scan
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TM_o31
          path: tm-scan-tool
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tm-scan dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tm-scan-tool/requirements.txt

      - name: Run tm-scan (local quick mode)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: "true"
        run: |
          cd tm-scan-tool
          python tm-scan --local-dir "$GITHUB_WORKSPACE/target-repo" --mode quick --fail-on-critical
      - name: Locate SARIF artifact
        id: find-sarif
        if: success() || failure()
        run: |
          SARIF_PATH=$(find "$HOME/tm-output" -name "threatmodel-report.sarif" -print -quit 2>/dev/null || true)
          if [ -n "$SARIF_PATH" ]; then
            echo "SARIF_FILE=$SARIF_PATH" >> "$GITHUB_ENV"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No SARIF file found — skipping upload."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF results
        if: (success() || failure()) && steps.find-sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.SARIF_FILE }}

      - name: Run deterministic PR reviewer
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python tm-scan-tool/scripts/local_pr_reviewer.py

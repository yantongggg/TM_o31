    recommended_controls:
      - "Use HttpOnly cookies (web) where feasible"
      - "Mobile secure storage (Keychain/Keystore) + device binding"
      - "Short-lived access tokens + rotation + refresh token hardening"
    questions_to_confirm:
      - "Are tokens stored in localStorage/AsyncStorage?"
      - "Are refresh tokens protected with OS-level secure storage?"

  - id: "TM-CLOUD-001"
    name: "Over-Permissive CORS (Access-Control-Allow-Origin: *) with Credentials"
    stride_category: "Information Disclosure"
    linddun_category: "Disclosure of Information"
    description: "Wildcard CORS, especially with credentials, allows cross-origin reads and token leakage."
    default_likelihood: "High"
    default_impact: "High"
    keywords: ["Access-Control-Allow-Origin", "*", "cors()", "allowCredentials", "withCredentials", "addAllowedOrigin(\"*\")", "setAllowedOrigins"]
    compliance:
      cwe_id: "CWE-942"
      owasp_api: "API7:2023 Security Misconfiguration"
    pasta_context:
      threat_actor: "External attacker via malicious website"
      attack_surface: "Browser-accessible APIs"
      attack_vector: "Cross-origin requests reading protected responses"
      business_impact: "Session hijacking, data exfiltration"
    dread_score:
      damage: 8
      reproducibility: 9
      exploitability: 8
      affected_users: 8
      discoverability: 8
    reviewer_message: "Use explicit allowlists for origins. Never use wildcard origins with credentials."
    auto_fix_snippet: |
      # Pseudocode: strict CORS
      ALLOWED_ORIGINS = {"https://app.example.com", "https://admin.example.com"}
      def cors_middleware(req, res):
          origin = req.headers.get("Origin")
          if origin in ALLOWED_ORIGINS:
              res.set("Access-Control-Allow-Origin", origin)
              res.set("Vary", "Origin")
              res.set("Access-Control-Allow-Credentials", "true")
          else:
              # no CORS headers
              pass
    recommended_controls:
      - "Origin allowlist + Vary: Origin"
      - "Separate public vs private APIs"
      - "Preflight validation and header minimization"
    questions_to_confirm:
      - "Is Access-Control-Allow-Origin set dynamically and safely?"
      - "Are credentials enabled with wildcard origins?"

  - id: "TM-CLOUD-002"

# Knowledge Base: Omni-Stack Enterprise Threat Patterns (Deterministic Agentic)
# Schema per threat:
# - id, name, stride_category, linddun_category (if applicable), description
# - default_likelihood, default_impact
# - keywords (strings)
# - compliance: cwe_id, owasp_api
# - pasta_context: threat_actor, attack_surface, attack_vector, business_impact
# - dread_score: damage, reproducibility, exploitability, affected_users, discoverability (1-10 ints)
# - reviewer_message, auto_fix_snippet (agnostic or multi-language pseudocode)
# - recommended_controls, questions_to_confirm

threats:
  - id: "TM-API-001"
    name: "Broken Object Level Authorization (IDOR)"
    stride_category: "Elevation of Privilege"
    linddun_category: "Unawareness"
    description: "API exposes object identifiers without enforcing per-object authorization, enabling cross-tenant data access."
    default_likelihood: "High"
    default_impact: "High"
    keywords: ["/v1/", "id=", "objectId", "findById", "getById", "axios.get", "GET /", "/graphql", "nodeId"]
    compliance:
      cwe_id: "CWE-639"
      owasp_api: "API1:2023 Broken Object Level Authorization"
    pasta_context:
      threat_actor: "External authenticated user"
      attack_surface: "REST/GraphQL object endpoints"
      attack_vector: "Manipulated IDs or GUIDs in path/query/body"
      business_impact: "Cross-tenant data exposure and privacy breach"
    dread_score:
      damage: 9
      reproducibility: 8
      exploitability: 8
      affected_users: 9
      discoverability: 7
    reviewer_message: "Verify per-object authorization on every ID-bearing endpoint. Enforce tenant scoping and ownership checks server-side."
    auto_fix_snippet: |
      # Pseudocode: enforce ownership check
      def fetch_scoped_object(user, object_id):
          obj = repo.fetch(object_id)
          if not obj:
              raise NotFound()
          if obj.tenant_id != user.tenant_id:
              raise Forbidden("unauthorized object access")
          return obj
    recommended_controls:
      - "Enforce ownership/tenant checks at controller/service layer"
      - "Use scoped queries (WHERE tenant_id = ? AND id = ?)"
      - "Add ABAC/RBAC guards around object resources"
    questions_to_confirm:
      - "Are IDs scoped to tenant/account in every DAO query?"
      - "Is authorization enforced even if the attacker guesses valid IDs?"

  - id: "TM-API-002"
    name: "Server-Side Request Forgery (SSRF) to Internal/Metadata Services"
    stride_category: "Information Disclosure"
    linddun_category: "Linkability"
    description: "Unvalidated outbound HTTP requests enable access to internal services and cloud metadata endpoints."
    default_likelihood: "Medium"
    default_impact: "Critical"
    keywords: ["axios.get", "requests.get", "http.Get(", "fetch(", "RestTemplate", "HttpClient", "169.254.169.254", "metadata.google.internal", "latest/meta-data", "file://", "gopher://"]
    compliance:
      cwe_id: "CWE-918"
      owasp_api: "API8:2023 Security Misconfiguration"
    pasta_context:
      threat_actor: "External attacker"
      attack_surface: "URL fetchers, webhooks, importers, image/document fetchers"
      attack_vector: "User-controlled URL reaching internal IPs/hostnames"
      business_impact: "Credential exfiltration, internal network pivot, data breach"
    dread_score:
      damage: 10
      reproducibility: 7
      exploitability: 8
      affected_users: 9
      discoverability: 6
    reviewer_message: "Guard all outbound fetchers with allowlists and block link-local/private ranges (including metadata IPs)."
    auto_fix_snippet: |
      # Pseudocode: URL allowlist + IP range blocking
      def safe_fetch(url):
          parsed = parse_url(url)
          if parsed.scheme not in ["https"]:
              raise Forbidden("scheme not allowed")
          ip = resolve_dns(parsed.host)
          if ip_in_private_ranges(ip) or ip_in_link_local(ip):
              raise Forbidden("internal destinations blocked")
          if not host_is_allowlisted(parsed.host):
              raise Forbidden("host not allowlisted")
          return http_get(url, timeout_seconds=2, follow_redirects=False)
    recommended_controls:
      - "Egress proxy with ACLs for outbound traffic"
      - "DNS/IP resolution + private range blocking"
      - "Disable redirects or re-validate after redirects"
    questions_to_confirm:
      - "Do we block 169.254.169.254 and other metadata endpoints?"
      - "Do we validate final destination after redirects?"

  - id: "TM-API-003"
    name: "SQL Injection via String Concatenation / Unsafe Query Construction"
    stride_category: "Tampering"
    linddun_category: "Non-repudiation"
    description: "Concatenating untrusted input into SQL queries allows injection, data exfiltration, and corruption."
    default_likelihood: "High"
    default_impact: "Critical"
    keywords: ["executeQuery", "Statement", "SELECT * FROM", "WHERE " , "cursor.execute", "fmt.Sprintf(\"SELECT", "f\"SELECT", "format(", "QueryRaw", "FromSqlRaw", "sequelize.query", "$queryRaw"]
    compliance:
      cwe_id: "CWE-89"
      owasp_api: "API8:2023 Security Misconfiguration"
    pasta_context:
      threat_actor: "External attacker"
      attack_surface: "Search/filter endpoints, admin panels, report generators"
      attack_vector: "Injected payloads via query params/body fields"
      business_impact: "PII leakage, financial loss, database compromise"
    dread_score:
      damage: 10
      reproducibility: 9
      exploitability: 8
      affected_users: 9
      discoverability: 8
    reviewer_message: "Replace string-built SQL with parameterized queries/prepared statements. Ensure ORM raw queries are parameterized."
    auto_fix_snippet: |
      # Examples (multi-language pseudocode)
      # Python:
      cursor.execute("SELECT * FROM accounts WHERE id = %s", (user_id,))
      # Java:
      ps = conn.prepareStatement("SELECT * FROM accounts WHERE id = ?");
      ps.setLong(1, userId);
      # Node:
      db.query("SELECT * FROM accounts WHERE id = $1", [userId]);
    recommended_controls:
      - "Prepared statements everywhere"
      - "Centralize query building; ban raw concatenation by linting"
      - "Least-privileged DB roles"
    questions_to_confirm:
      - "Do any queries build SQL via concat/format/interpolation?"
      - "Are raw ORM queries audited and parameterized?"

  - id: "TM-API-004"
    name: "NoSQL Injection / Query Operator Injection"
    stride_category: "Tampering"
    linddun_category: "Unawareness"
    description: "Untrusted JSON objects are used directly in NoSQL queries, enabling operator injection (e.g., $ne, $gt)."
    default_likelihood: "High"
    default_impact: "High"
    keywords: ["$ne", "$gt", "$where", "findOne(", "collection.find(", "mongoose", "BsonDocument", "Filters.eq", "prisma.findMany", "where:"]
    compliance:
      cwe_id: "CWE-943"
      owasp_api: "API8:2023 Security Misconfiguration"
    pasta_context:
      threat_actor: "External attacker"
      attack_surface: "MongoDB/Document DB query endpoints"
      attack_vector: "Injected query operators via JSON body or params"
      business_impact: "Auth bypass, unauthorized reads, data leakage"
    dread_score:
      damage: 8
      reproducibility: 9
      exploitability: 8
      affected_users: 8
      discoverability: 7
    reviewer_message: "Do not pass user-controlled objects into NoSQL filters. Enforce schemas and allowlisted fields/types."
    auto_fix_snippet: |
      # Pseudocode: allowlist-based query building
      allowed_fields = {"email", "user_id", "status"}
      def build_filter(user_input):
          f = {}
          for k, v in user_input.items():
              if k in allowed_fields and is_scalar(v):
                  f[k] = v
          return f
      results = collection.find(build_filter(request.json))
    recommended_controls:
      - "Schema validation (JSON Schema / Pydantic / Joi)"
      - "Reject query operators from client input"
      - "Use typed query builders"
    questions_to_confirm:
      - "Can a client send nested objects into query filters?"
      - "Are query fields allowlisted and typed?"

  - id: "TM-API-005"
    name: "GraphQL Authorization Bypass (Resolver-Level Missing Checks)"
    stride_category: "Elevation of Privilege"
    linddun_category: "Unawareness"
    description: "GraphQL resolvers expose sensitive fields or objects without per-field/per-object authorization."
    default_likelihood: "High"
    default_impact: "High"
    keywords: ["type Query", "type Mutation", "resolver", "context.user", "graphql", "apollo-server", "@auth", "@Authorized", "schema.graphql", "GraphQLObjectType"]
    compliance:
      cwe_id: "CWE-285"
      owasp_api: "API1:2023 Broken Object Level Authorization"
    pasta_context:
      threat_actor: "External authenticated user"
      attack_surface: "GraphQL endpoint and resolvers"
      attack_vector: "Querying unauthorized fields/objects; ID tampering in resolver args"
      business_impact: "Cross-tenant data exposure and privacy breach"
    dread_score:
      damage: 9
      reproducibility: 8
      exploitability: 7
      affected_users: 8
      discoverability: 7
    reviewer_message: "Enforce authz in every resolver and field that returns tenant-scoped data. Do not rely on UI to hide fields."
    auto_fix_snippet: |
      # Pseudocode: resolver auth guard
      def resolve_user(parent, args, ctx):
          require_authenticated(ctx)
          user = repo.fetch_user(args["id"])
          if user.tenant_id != ctx.user.tenant_id:
              raise Forbidden()
          return user
    recommended_controls:
      - "Central authz middleware for resolvers"
      - "Field-level auth directives"
      - "Disable GraphQL introspection in production where appropriate"
    questions_to_confirm:
      - "Do all resolvers enforce tenant scoping?"
      - "Is introspection enabled in production?"

  - id: "TM-API-006"
    name: "XML External Entity (XXE) / Unsafe XML Parsing"
    stride_category: "Information Disclosure"
    linddun_category: "Linkability"
    description: "XML parsers with DTD/external entities enabled allow file disclosure or SSRF via entity expansion."
    default_likelihood: "Medium"
    default_impact: "High"
    keywords: ["DocumentBuilderFactory", "setExpandEntityReferences", "XMLInputFactory", "SAXParserFactory", "DOCTYPE", "<!ENTITY", "lxml", "xml.etree", "XmlReaderSettings", "DtdProcessing"]
    compliance:
      cwe_id: "CWE-611"
      owasp_api: "API8:2023 Security Misconfiguration"
    pasta_context:
      threat_actor: "External attacker"
      attack_surface: "XML upload endpoints, SAML, SOAP, legacy integrations"
      attack_vector: "Crafted XML with external entities"
      business_impact: "File disclosure, SSRF pivot, credential exposure"
    dread_score:
      damage: 8
      reproducibility: 7
      exploitability: 7
      affected_users: 7
      discoverability: 6
    reviewer_message: "Disable DTD/external entities and use hardened XML parsers. Treat XML as hostile input."
    auto_fix_snippet: |
      # Pseudocode: secure XML parsing
      # Java: disable DTD
      factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true)
      factory.setFeature("http://xml.org/sax/features/external-general-entities", false)
      factory.setFeature("http://xml.org/sax/features/external-parameter-entities", false)
      # .NET:
      settings.DtdProcessing = Prohibit
    recommended_controls:
      - "Harden XML parser configuration"
      - "Prefer JSON where possible"
      - "Input size limits to prevent entity expansion DoS"
    questions_to_confirm:
      - "Do we parse XML from untrusted sources (uploads, SAML, SOAP)?"
      - "Are DTD/external entities explicitly disabled?"

  - id: "TM-AUTH-001"
    name: "Weak JWT Verification (alg=none, HS256 misuse, missing claims validation)"
    stride_category: "Spoofing"
    linddun_category: "Linkability"
    description: "JWTs are accepted without signature verification, with alg=none, weak HS256 secrets, or missing aud/iss/exp validation."
    default_likelihood: "Medium"
    default_impact: "High"
    keywords: ["jwt.decode", "jsonwebtoken.verify", "alg\": \"none", "HS256", "RS256", "kid", "verify=False", "options={\"verify_signature\": False}", "skipSignatureValidation"]
    compliance:
      cwe_id: "CWE-347"
      owasp_api: "API2:2023 Broken Authentication"
    pasta_context:
      threat_actor: "External attacker"
      attack_surface: "JWT auth middleware"
      attack_vector: "Forged tokens, algorithm confusion, replay of expired tokens"
      business_impact: "Account takeover and privilege escalation"
    dread_score:
      damage: 9
      reproducibility: 8
      exploitability: 8
      affected_users: 8
      discoverability: 7
    reviewer_message: "Strictly verify JWT signatures, pin algorithms, and validate issuer/audience/expiry. Do not accept alg=none."
    auto_fix_snippet: |
      # Pseudocode: strict JWT validation
      def verify_jwt(token):
          header = jwt_parse_header(token)
          if header.alg not in ["RS256", "ES256"]:
              raise Unauthorized("disallowed alg")
          key = jwks_fetch_and_select(header.kid)
          claims = jwt_verify(token, key=key, algorithms=["RS256", "ES256"])
          require(claims.exp > now())
          require(claims.iss in ALLOWED_ISSUERS)
          require(claims.aud in ALLOWED_AUDIENCES)
          return claims
    recommended_controls:
      - "Use asymmetric signing (RS256/ES256) for enterprise services"
      - "Rotate keys via KMS/Vault; enforce JWKS caching and pinning"
      - "Validate exp/nbf/iss/aud/sub consistently"
    questions_to_confirm:
      - "Are algorithms pinned and 'none' rejected?"
      - "Do we validate aud/iss and expiration on every request?"

  - id: "TM-AUTH-002"
    name: "Credential Stuffing / Missing Rate Limiting on Auth Endpoints"
    stride_category: "Denial of Service"
    linddun_category: "Detectability"
    description: "Authentication endpoints lack throttling and abuse protections, enabling credential stuffing and resource exhaustion."
    default_likelihood: "High"
    default_impact: "High"
    keywords: ["/login", "/signin", "/token", "authenticate", "rateLimiter", "bucket4j", "429", "Too many requests", "Recaptcha", "lockout"]
    compliance:
      cwe_id: "CWE-307"
      owasp_api: "API4:2023 Unrestricted Resource Consumption"
    pasta_context:
      threat_actor: "External attacker (botnet)"
      attack_surface: "Login, token refresh, password reset, OTP endpoints"
      attack_vector: "High-rate brute force and credential stuffing"
      business_impact: "Account takeover, auth outage, infra cost spike"
    dread_score:
      damage: 8
      reproducibility: 9
      exploitability: 8
      affected_users: 8
      discoverability: 8
    reviewer_message: "Add IP + account-based rate limits, progressive delays, anomaly detection, and step-up challenges."
    auto_fix_snippet: |
      # Pseudocode: combined throttling
      def login(request):
          if not rate_limit.allow(ip=request.ip, key="login_ip", per_minute=30):
              return error(429)
          if not rate_limit.allow(key=f"login_user:{request.username}", per_minute=10):
              return error(429)
          if is_anomalous(request):
              require_captcha()
          return authenticate(request)
    recommended_controls:
      - "IP + account throttling"
      - "Credential stuffing detection (known breached passwords, velocity checks)"
      - "Step-up MFA for risky logins"
    questions_to_confirm:
      - "Do we throttle by IP and by account identifier?"
      - "Do we have lockout/backoff and 2FA/step-up flows?"

  - id: "TM-CRYPTO-001"
    name: "Broken / Weak Cryptography (MD5/SHA1/DES/ECB) for Secrets or Sensitive Data"
    stride_category: "Information Disclosure"
    linddun_category: "Linkability"
    description: "Use of outdated hashing/encryption algorithms or insecure modes enables offline cracking and data compromise."
    default_likelihood: "Medium"
    default_impact: "High"
    keywords: ["MD5", "SHA1", "DES", "RC4", "ECB", "MessageDigest.getInstance(\"MD5\")", "hashlib.md5", "CryptoJS.MD5", "AES/ECB", "Cipher.getInstance(\"DES", "pbkdf2", "bcrypt", "argon2"]
    compliance:
      cwe_id: "CWE-327"
      owasp_api: "API2:2023 Broken Authentication"
    pasta_context:
      threat_actor: "External attacker or insider"
      attack_surface: "Password storage, token derivation, encryption at rest, backups"
      attack_vector: "Offline cracking; ciphertext pattern analysis"
      business_impact: "Account compromise, regulatory breach, reputational damage"
    dread_score:
      damage: 9
      reproducibility: 8
      exploitability: 7
      affected_users: 9
      discoverability: 7
    reviewer_message: "Replace weak crypto with modern primitives: Argon2id/bcrypt for passwords; AES-GCM/ChaCha20-Poly1305 for encryption; avoid ECB."
    auto_fix_snippet: |
      # Pseudocode: secure password hashing
      password_hash = argon2id_hash(password, memory_mb=64, iterations=3, parallelism=2, salt=random_bytes(16))
      # Pseudocode: secure encryption
      ciphertext = aead_encrypt(key, nonce=random_bytes(12), plaintext=data, aad=context)
    recommended_controls:
      - "Ban weak algorithms by policy/lint"
      - "Use AEAD modes (AES-GCM)"
      - "Centralize crypto utilities and key management (KMS/HSM)"
    questions_to_confirm:
      - "Are passwords stored using bcrypt/Argon2 with per-user salts?"
      - "Is any AES used in ECB/CBC without authentication?"

  - id: "TM-PRIV-001"
    name: "Improper Logging of PII/Secrets (Tokens, Passwords, Full User Objects)"
    stride_category: "Information Disclosure"
    linddun_category: "Detectability"
    description: "Logs include raw PII (email, SSN, phone), credentials, or tokens, violating privacy and compliance controls."
    default_likelihood: "High"
    default_impact: "High"
    keywords: ["logger.info", "console.log", "printStackTrace", "Authorization:", "Bearer ", "Set-Cookie", "password", "SSN", "email=", "phone=", "access_token", "id_token"]
    compliance:
      cwe_id: "CWE-532"
      owasp_api: "API9:2023 Improper Inventory/Logging"
    pasta_context:
      threat_actor: "Insider or attacker with log access"
      attack_surface: "Application logs, APM traces, centralized log stores"
      attack_vector: "Sensitive fields emitted without redaction"
      business_impact: "Privacy breach, regulatory fines, incident response cost"
    dread_score:
      damage: 8
      reproducibility: 9
      exploitability: 7
      affected_users: 9
      discoverability: 8
    reviewer_message: "Adopt structured logging with allowlisted fields only. Redact tokens/PII by default."
    auto_fix_snippet: |
      # Pseudocode: allowlist structured logging
      SAFE_FIELDS = {"request_id", "user_id", "action", "result"}
      def safe_log(event):
          sanitized = {k: v for k, v in event.items() if k in SAFE_FIELDS}
          logger.info(sanitized)
    recommended_controls:
      - "Structured logging + field allowlists"
      - "Redaction middleware for HTTP headers/body"
      - "Secrets scanning on logs and APM payloads"
    questions_to_confirm:
      - "Are Authorization headers or tokens ever logged?"
      - "Do we log full request/response bodies in production?"

  - id: "TM-PRIV-002"
    name: "Insecure Client-Side Storage of Secrets/PII (Web/Mobile)"
    stride_category: "Information Disclosure"
    linddun_category: "Disclosure of Information"
    description: "Sensitive data stored in plaintext client storage (localStorage, AsyncStorage, SharedPreferences) can be exfiltrated."
    default_likelihood: "High"
    default_impact: "High"
    keywords: ["localStorage.setItem", "sessionStorage.setItem", "AsyncStorage.setItem", "SharedPreferences", "NSUserDefaults", "Keychain", "Keystore", "secureStorage", "MMKV", "sqlite", "realm"]
    compliance:
      cwe_id: "CWE-312"
      owasp_api: "API2:2023 Broken Authentication"
    pasta_context:
      threat_actor: "Malicious app, malware, physical device attacker, XSS attacker"
      attack_surface: "Browser storage, mobile app storage"
      attack_vector: "Reading plaintext tokens/PII from client storage"
      business_impact: "Account takeover, PII leakage, session hijacking"
    dread_score:
      damage: 8
      reproducibility: 8
      exploitability: 7
      affected_users: 8
      discoverability: 7
    reviewer_message: "Do not store long-lived tokens in plaintext client storage. Use secure OS keystores and short-lived tokens."
    auto_fix_snippet: |
      # Pseudocode: secure token storage strategy

      - "Use IAM roles / workload identity federation"
      - "Central secret manager with rotation and auditing"
    questions_to_confirm:
      - "Are any long-lived keys committed or present in CI logs?"
      - "Is workload identity used instead of static keys?"

  - id: "TM-K8S-001"
    name: "Privileged Containers / Host Namespace Exposure"
    stride_category: "Elevation of Privilege"
    linddun_category: "Linkability"
    description: "Kubernetes workloads running privileged or with hostPID/hostNetwork can escape containers or access node resources."
    default_likelihood: "Medium"
    default_impact: "Critical"
    keywords: ["privileged: true", "hostPID: true", "hostNetwork: true", "hostPath", "cap_add", "SYS_ADMIN", "allowPrivilegeEscalation: true"]
    compliance:
      cwe_id: "CWE-250"
      owasp_api: "API5:2023 Broken Function Level Authorization"
    pasta_context:
      threat_actor: "Malicious workload, compromised container"
      attack_surface: "Kubernetes manifests, Helm charts, operators"
      attack_vector: "Privilege escalation via pod security context"
      business_impact: "Cluster takeover, node escape, data exfiltration"
    dread_score:
      damage: 10
      reproducibility: 7
      exploitability: 7
      affected_users: 9
      discoverability: 6
    reviewer_message: "Disallow privileged pods and host namespaces. Enforce Pod Security Standards and drop Linux capabilities by default."
    auto_fix_snippet: |
      # Kubernetes pod hardening (pseudocode YAML)
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]

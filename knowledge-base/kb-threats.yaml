  - id: "TM-BIZ-003"
    name: "Race Condition / TOCTOU in Financial Operations (Double Spend, Coupon Abuse)"
    stride_category: "Tampering"
    linddun_category: "Non-repudiation"
    description: "Concurrent requests exploit non-atomic checks, leading to double spends, duplicate refunds, or coupon reuse."
    default_likelihood: "Medium"
    default_impact: "High"
    keywords: ["transaction", "balance", "deduct", "reserve", "coupon", "redeem", "idempotency", "SELECT ... FOR UPDATE", "optimistic lock", "version column"]
    compliance:
      cwe_id: "CWE-362"
      owasp_api: "API4:2023 Unrestricted Resource Consumption"
    pasta_context:
      threat_actor: "Fraudster or automation scripts"
      attack_surface: "Payment, wallet, coupon, inventory reservation endpoints"
      attack_vector: "Parallel requests, replay, race exploitation"
      business_impact: "Financial loss, ledger inconsistencies, reconciliation failures"
    dread_score:
      damage: 8
      reproducibility: 7
      exploitability: 7
      affected_users: 7
      discoverability: 6
    reviewer_message: "Make state transitions atomic using DB transactions/locks or idempotency keys. Ensure operations are replay-safe."
    auto_fix_snippet: |
      # Pseudocode: idempotency + atomic update
      def redeem_coupon(user, coupon_id, idem_key):
          if idem_store.seen(idem_key):
              return idem_store.result(idem_key)
          with db.transaction():
              coupon = db.fetch_for_update("coupon", coupon_id)
              if coupon.used_by is not None:
                  raise Conflict("already used")
              db.update("coupon", coupon_id, {"used_by": user.id})
          idem_store.save(idem_key, "success")
          return "success"
    recommended_controls:
      - "Idempotency keys for money-moving endpoints"
      - "Row locks / optimistic concurrency control"
      - "Replay detection and deduplication"
    questions_to_confirm:
      - "Are money-moving endpoints idempotent?"
      - "Are state transitions protected by transactions/locking?"